name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Python 3.13 checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile app
        run: python -m compileall app

      - name: Run smoke tests
        run: pytest

  docker:
    name: Docker build checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FastAPI container
        run: docker build -f backend/Dockerfile backend

      - name: Build Lambda container
        run: docker build --platform linux/amd64 -f backend/Dockerfile.lambda backend
