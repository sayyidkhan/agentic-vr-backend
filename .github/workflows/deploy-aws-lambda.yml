name: Deploy Backend to AWS Lambda

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
  SERVICE_NAME: ${{ vars.SERVICE_NAME || 'sceneverse-backend' }}
  ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME || 'prod' }}
  FRONTEND_URL: ${{ vars.FRONTEND_URL || 'http://localhost:5173' }}
  CORS_ORIGINS: ${{ vars.CORS_ORIGINS || '*' }}

jobs:
  deploy:
    name: Build zip and deploy Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build zip and deploy Lambda
        id: deploy
        run: bash infra/aws/deploy-lambda-zip.sh

      - name: Print Function URL
        run: echo "${{ steps.deploy.outputs.function_url }}"

      - name: Smoke test Function URL
        run: |
          BASE_URL="${{ steps.deploy.outputs.function_url }}"
          curl --fail --silent --show-error "${BASE_URL%/}/health"
